<div class="container">
  <h2>Products</h2>

  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Actions</th>
    </tr>

    @for (p of products(); track p.id) {
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.price }}</td>
        <td>
          <button (click)="delete(p.id)">Delete</button>
        </td>
      </tr>
    }
  </table>
</div>
